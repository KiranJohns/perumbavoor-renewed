<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perumbavoor Surgicals - Products Catalog</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:Inter,Arial,sans-serif;background:#f8fbff;color:#1e293b}
    nav{
      position:sticky;top:0;background:#fff;padding:18px 5%;
      display:flex;justify-content:space-between;align-items:center;
      box-shadow:0 2px 20px rgba(0,0,0,.08);z-index:100
    }
    nav a{text-decoration:none;color:#0f766e;font-weight:700;margin-left:20px}
    .hero{
      padding:80px 5%;text-align:center;
      background:linear-gradient(135deg,#e6fffb,#eff6ff)
    }
    .hero h1{font-size:3rem;margin-bottom:10px}
    .hero p{max-width:800px;margin:auto;color:#64748b;line-height:1.6}
    .search{max-width:700px;margin:30px auto 0}
    .search input{
      width:100%;padding:15px 18px;border:1px solid #cbd5e1;
      border-radius:12px;font-size:16px;outline:none
    }
    .search input:focus{border-color:#0f766e;box-shadow:0 0 0 3px rgba(15,118,110,.12)}
    .category{padding:60px 5%}
    .category h2{
      margin-bottom:25px;color:#0f766e;border-left:5px solid #0f766e;
      padding-left:15px;font-size:1.6rem
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:20px
    }
    .card{
      background:#fff;border-radius:18px;overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,.06);
      transition:.3s ease
    }
    .card:hover{transform:translateY(-6px)}
    .card img{
      width:100%;height:180px;object-fit:contain;display:block;
      background:#eef6ff
    }
    .card h3{padding:16px;font-size:15px;line-height:1.4}
    footer{
      background:#0f172a;color:#fff;text-align:center;padding:30px 15px;
      margin-top:20px
    }
    .muted{color:#94a3b8;font-size:.95rem;margin-top:6px}
    @media(max-width:768px){
      .hero h1{font-size:2rem}
      nav{padding:16px 4%}
      .category{padding:40px 4%}
      .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
      .card img{height:150px}
    }
  </style>
</head>
<body>
  <nav>
    <div><strong>Perumbavoor Surgicals</strong></div>
    <div>
      <a href="#">Home</a>
      <a href="#products">Products</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Medical Products Catalogue</h1>
    <p>Hospital Furniture, Surgical Instruments, Home Healthcare, Orthopaedic Products, Clinical Equipment and more.</p>
    <div class="search">
      <input id="search" type="text" placeholder="Search products..." />
    </div>
  </section>

  <div id="products"></div>

  <footer>
    <div>Perumbavoor Surgicals</div>
    <div class="muted">Medical products catalogue</div>
  </footer>

  <script>
    const categories = {
      "Hygienic Products":[
        "DYNA N95 Mask","3 Ply Face Mask","Bouffant Cap","Wringer Trolley","SS 4 BIN SET 20 SET Ltr.","Bouffant Cap","Dr. Morepen Pulse Oxymeter","Hand Sanitiser","Foot Operated Dustbin","Lab Coat","Surgeon Gown","Non Contact Thermometer",
      "Disposable Hub Cutter", "Dustbin And Garbage Bag", "House Hold Gloves", "Nitrile Gloves", "Caution Board", "Manual Syringe Needle Cutter"],
      
      "Wheelchairs":[
        "MH 10.3","MH Rainbow 8","MH Fighter C","MH Fighter C HS","MH Rainbow 6","MH Sunny 6","MH Sunny 7","MH Sunny 8","MH PC1 Paediatric","MH CP 200","MH 500","MH Ergo Light 2","MH Sergo 305","MH Rainbow 2 C","MH Rainbow 5" 
      ],
      "Commode Series":[
        "MH Rainbow 9","MH Rainbow 11","MH Rider 210","MH 900","MH 449 Toilet Raiser"
      ],
      "Hospital Furniture":[
        "MOTORIZED ICU COT 5 FUNCTION","MANUAL ICU COT 5 FUNCTION","MOTORIZED ICU COT 3 FUNCTION","MANUAL ICU COT 3 FUNCTION","FOWLER COT 2 FUNCTION","SEMI FOWLER COT 1 FUNCTION","FOWLERS COT","SEMIFOWLER COT"," ORDINARY COT","EXAMINATION TABLE","EXAMINATION COUCH","SRETCHER TROLLEY","MEDICINE TROLLEY","DRESSING TROLLEY","CRASH CART TROLLEY","BED SIDE LOCKER","BED SIDE SCREEN","OXYGEN TROLLEY","REVOLVING STOOL"
      ,"FOOT STEР","LAB CHAIR","CARDIAC TABLE","IV STAND","TRIPPLE BUCKET MOPPING TROLLEY", "SIDE RAILS","LABOR COТ"],
      "Hospital Hollowares":[
        "DRESSING TRAY S.S", "KIDNEY TRAY S.S", "VERTICAL AUTOCLAVE S.S", "AUTOCLAVE", "DRESSING BIN S.S", "URINE CAN S.S", "BED PAN S.S", "FORCEPS JAR S.S", "SPITOON CUP S.S", "ELECTRICAL STERILISER S.S"
      ],
      "Diabetic & Orthopaedic Footwear": [
  "MCR SHOE",
  "MCR CHAPPAL",
  "MCR CHAPPAL",
  "MCR CHAPPAL",
  "MCR CHAPPAL",
],
      "Surgical Instruments":[
        "Dressing Scissors","Artery Forceps","Mosquito Forceps","Dissecting Forceps","Cheatle Jar & Forceps","BP Handle","Suture Cutting Scissors","Cuticle Scissors","Tailoring Scissors","Bandage Cutting Scissors"
      ],
      "Home Healthcare":[
        "Digital BP Monitor","Glucometer","Air Bed Bubble Type","Air Bed Tubular","Water Bed","Clinical Thermometer","Non Contact Termometer","Digital Thermometer","Height Weight Stature","Digital Weighing Scale","Vaporiser","Heating Pad","Yoga Mat","Cervical Pillow","Baby Wet Wipes","Baby Diaper","Body Massager","Hot Water Bag","Infrared Lamp"
      ],
      "Clinical Products":[
        "Piston Compressor Nebuliser","Mini Vaporiser","Stethoscope","BP Apparatus","Foetal Doppler","Aneroid Sphygmomanometer","Electric Hot Water Bag","Pen Torch","Needle Destroyer","Otoscope","Ophthalmoscope","Spotlight","X-Ray View Box","Vision Drum","LED Laryngoscope"
      ],
      // "Pain & Palliative":[
      //   "Adult Diaper","Urine Bag","Dressing Pad","Cotton Wool","Roller Bandage","Under Pad","Pull Up Diaper","Enema Can Set","Mackintosh Sheet","Nebulizer Mask","Condom Catheter","Wet Wipes","Grab Bar","Bedsore Cream","Surgical Gloves","Sterile Gauze Swab","Dettol","Savlon","Oxygen Mask","Feeding Syringe","Shoe Cover"
      // ],
      "Orthopaedic Products":[
        "Lumbo Sacral Belt","Abdominal Belt","Cervical Collar","Ankle Binder","Crepe Bandage","Knee Cap","Arm Sling","Varicose Stockings","Wrist Support","Walker","Back Rest","Knee Immobiliser","Crutches","Quadripod","Tripod"
      ],
      "Ortho/Miscellaneous": [
  "Oxygen Concentrator",
  "BiPAP",
  "CPAP",
  "Oxygen Cylinder Iron",
  "Oxygen Flow Meter",
  "Silicone Ambu Bag",
  "Oxygen Mask",
  "Tracheostomy Tube",
  "Respirometer",
  "Endotracheal Tube"
],
      // "Ostomy Care":[
      //   "Coloplast Ostomy Bag","Barrier Cream","Paste","Brava Elastic Tape","Brava Belt","Clamp","Lubricating Deodorant","Adhesive Remover Spray"
      // ],
      "Miscellaneous":[
        "Ice Bag","Blood Lancets","Gym Ball","Pop Plaster","Suture Needle","Yoga Mat","Nelaton Catheter","ECG Gel","Alcohol Swab","Cotton Gloves","Medical Spirit","Thera Band","Menstrual Cup","Ring Pessary","Adhesive Tape"
      ],
      "Surgical Equipment":[
        "Multipara Monitor 12.1","Multipara Monitor 8","ECG Machine 6 Channel","ECG Machine 3 Channel","Lifeline AED Defibrillator"
      ]
    };

    const container = document.getElementById('products');

    // Build one continuous image sequence from a1.jpg to a164.jpg
    const productImages = Array.from({ length: 168 }, (_, i) => `../assets/images/a${i + 1}.jpg`);
    let imageIndex = 0;

    Object.entries(categories).forEach(([cat, items]) => {
      let html = `<section class="category" data-category="${cat.toLowerCase()}">
        <h2>${cat} </h2>
        <div class="grid">`;

      items.forEach((p) => {
        const imagePath = productImages[imageIndex] || '../assets/images/no-image.jpg';
        imageIndex++;

        html += `
          <div class="card product" data-name="${p.toLowerCase()}">
            <img src="${imagePath}" alt="${p}" loading="lazy">
            <h3>${p}</h3>
          </div>`;
      });

      html += `</div></section>`;
      container.innerHTML += html;
    });

    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      document.querySelectorAll('.product').forEach((card) => {
        card.style.display = card.dataset.name.includes(q) ? 'block' : 'none';
      });
    });
  </script>
</body>
</html>
